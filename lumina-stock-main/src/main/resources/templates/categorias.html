<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gerenciar Categorias - Lumina</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm mb-4">
    <div class="container">
        <span class="navbar-brand fw-bold text-warning">
            <i class="bi bi-tags-fill"></i> Categorias
        </span>
        <div class="collapse navbar-collapse justify-content-end">
            <ul class="navbar-nav">
                <li class="nav-item">
                    <a class="nav-link" href="/menu"><i class="bi bi-grid-fill"></i> Menu Principal</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="/dashboard"><i class="bi bi-arrow-left"></i> Voltar ao Estoque</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<div class="container">
    <div th:if="${mensagem}" class="alert alert-success alert-dismissible fade show">
        <i class="bi bi-check-circle-fill"></i> <span th:text="${mensagem}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
    <div th:if="${erro}" class="alert alert-danger alert-dismissible fade show">
        <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${erro}"></span>
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>

    <div class="row">
        <div class="col-md-4 mb-4">
            <div class="card shadow">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">Nova Categoria</h5>
                </div>
                <div class="card-body">
                    <form th:action="@{/categorias/salvar}" th:object="${novaCategoria}" method="post">
                        <div class="mb-3">
                            <label class="form-label">Nome da Categoria</label>
                            <input type="text" class="form-control" th:field="*{nome}" placeholder="Ex: Fitas Neon" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100"><i class="bi bi-plus-lg"></i> Adicionar</button>
                    </form>
                </div>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">Categorias Cadastradas</h5>
                </div>
                <div class="card-body p-0">
                    <table class="table table-hover mb-0 align-middle">
                        <thead class="table-light">
                            <tr>
                                <th>ID</th>
                                <th>Nome</th>
                                <th class="text-end">Ações</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="cat : ${categorias}">
                                <td th:text="${cat.id}">1</td>
                                <td class="fw-bold" th:text="${cat.nome}">Fitas LED</td>
                                <td class="text-end">
                                    <a th:href="@{/categorias/deletar/{id}(id=${cat.id})}" class="btn btn-sm btn-outline-danger" onclick="return confirm('Deseja excluir esta categoria?')">
                                        <i class="bi bi-trash"></i> Excluir
                                    </a>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
