<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Verificação de Segurança - Lumina Stock</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .login-header {
            background-color: #0d6efd;
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
        .codigo-input {
            letter-spacing: 5px;
            font-size: 1.5rem;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card login-card">
                    <div class="login-header">
                        <h2 class="fw-bold mb-0">
                            <i class="bi bi-shield-lock-fill text-warning"></i> Lumina
                        </h2>
                        <p class="text-white-50 mb-0 mt-1">Autenticação em Duas Etapas</p>
                    </div>
                    
                    <div class="card-body p-4">
                        
                        <div th:if="${erro}" class="alert alert-danger py-2 text-center small fw-bold" role="alert">
                            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${erro}"></span>
                        </div>

                        <div class="text-center mb-4">
                            <p class="text-muted small">
                                Abra o seu aplicativo autenticador (Google Authenticator ou Authy) e digite o código de 6 dígitos gerado.
                            </p>
                        </div>

                        <form th:action="@{/validar-2fa}" method="post">
                            
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold d-block text-center">CÓDIGO DE AUTENTICAÇÃO</label>
                                <input type="text" class="form-control codigo-input fw-bold" name="codigo" maxlength="6" placeholder="000000" autocomplete="off" required autofocus>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-warning fw-bold py-2 shadow-sm">
                                    Verificar e Entrar <i class="bi bi-check-circle"></i>
                                </button>
                                
                                <a th:href="@{/login}" class="btn btn-link text-decoration-none text-muted mt-2">
                                    <i class="bi bi-arrow-left"></i> Cancelar e Voltar
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputCodigo = document.querySelector('input[name="codigo"]');
        inputCodigo.addEventListener('input', function (e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
