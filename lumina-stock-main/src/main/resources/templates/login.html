<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Login - Lumina Stock</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #f8f9fa;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .login-header {
            background-color: #0d6efd; /* Azul primary do seu index */
            color: white;
            padding: 30px 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5 col-lg-4">
                <div class="card login-card">
                    <div class="login-header">
                        <h2 class="fw-bold mb-0">
                            <i class="bi bi-lightbulb-fill text-warning"></i> Lumina
                        </h2>
                        <p class="text-white-50 mb-0 mt-1">Acesso ao Sistema</p>
                    </div>
                    
                    <div class="card-body p-4">
                        
                        <div th:if="${erro}" class="alert alert-danger py-2 text-center small fw-bold" role="alert">
                            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${erro}"></span>
                        </div>

                        <div th:if="${sucesso}" class="alert alert-success py-2 text-center small fw-bold" role="alert">
                            <i class="bi bi-check-circle-fill"></i> <span th:text="${sucesso}"></span>
                        </div>

                        <form th:action="@{/logar}" method="post">
                            <div class="mb-3">
                                <label class="form-label text-muted small fw-bold">USUÁRIO</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-person"></i></span>
                                    <input type="text" class="form-control" name="usuario" placeholder="Digite seu usuário" required autofocus>
                                </div>
                            </div>
                            
                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">SENHA</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light"><i class="bi bi-lock"></i></span>
                                    <input type="password" class="form-control" name="senha" placeholder="Digite sua senha" required>
                                </div>
                            </div>
                            
                            <div class="d-grid gap-2">
                                <button type="submit" class="btn btn-warning fw-bold py-2 shadow-sm">
                                    Entrar <i class="bi bi-box-arrow-in-right"></i>
                                </button>
                                
                                <a th:href="@{/registrar}" class="btn btn-outline-primary fw-bold py-2 mt-2 shadow-sm">
                                    Criar Conta <i class="bi bi-person-plus"></i>
                                </a>
                                
                                <a href="/" class="btn btn-link text-decoration-none text-muted mt-2">
                                    <i class="bi bi-arrow-left"></i> Voltar ao Início
                                </a>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
