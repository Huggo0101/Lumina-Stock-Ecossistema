<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Gerenciar Produto - Lumina Stock</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .custom-card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            overflow: hidden;
        }
        .card-header-custom {
            background-color: #0d6efd; /* Azul primary padrão do Lumina */
            color: white;
            padding: 25px 20px;
            text-align: center;
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-dark bg-primary shadow-sm">
        <div class="container">
            <span class="navbar-brand fw-bold">
                <i class="bi bi-lightbulb-fill text-warning"></i> Lumina Stock
            </span>
            <a href="/logout" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-left"></i> Sair
            </a>
        </div>
    </nav>

    <div class="container py-5 flex-grow-1 d-flex align-items-center justify-content-center">
        <div class="row w-100 justify-content-center">
            <div class="col-md-8 col-lg-6">
                <div class="card custom-card">
                    
                    <div class="card-header-custom">
                        <h4 class="mb-0 fw-bold">
                            <i class="bi bi-box-seam me-2 text-warning"></i>
                            <span th:text="${produto.id == null} ? 'Cadastrar Novo Produto' : 'Editar Produto'"></span>
                        </h4>
                        <p class="mb-0 small text-white-50 mt-1">Preencha as informações do item no catálogo</p>
                    </div>
                    
                    <div class="card-body p-4 p-md-5">
                        <form th:action="@{/salvar}" th:object="${produto}" method="post" id="formProduto">
                            
                            <input type="hidden" th:field="*{id}">

                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">NOME DO PRODUTO</label>
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-tag text-secondary"></i></span>
                                    <input type="text" class="form-control border-start-0 ps-0" th:field="*{nome}" placeholder="Ex: Lustre Cristal" required autofocus>
                                </div>
                            </div>

                            <div class="mb-4">
                                <label class="form-label text-muted small fw-bold">CATEGORIA</label>
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-collection text-secondary"></i></span>
                                    <select class="form-select border-start-0 ps-0" th:field="*{categoria}" required>
                                        <option value="" disabled selected>Selecione uma categoria...</option>
                                        <option th:each="cat : ${categorias}" th:value="${cat.id}" th:text="${cat.nome}"></option>
                                    </select>
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-4">
                                    <label class="form-label text-muted small fw-bold">PREÇO DE CUSTO (R$)</label>
                                    <div class="input-group shadow-sm">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-currency-dollar text-danger"></i></span>
                                        <input type="text" class="form-control border-start-0 ps-0 mascara-dinheiro" th:field="*{precoCusto}" placeholder="0,00" required>
                                    </div>
                                </div>
                                
                                <div class="col-md-6 mb-4">
                                    <label class="form-label text-muted small fw-bold">PREÇO DE VENDA (R$)</label>
                                    <div class="input-group shadow-sm">
                                        <span class="input-group-text bg-light border-end-0"><i class="bi bi-currency-dollar text-success"></i></span>
                                        <input type="text" class="form-control border-start-0 ps-0 mascara-dinheiro" th:field="*{precoVenda}" placeholder="0,00" required>
                                    </div>
                                </div>
                            </div>

                            <div class="mb-5">
                                <label class="form-label text-muted small fw-bold">QUANTIDADE EM ESTOQUE</label>
                                <div class="input-group shadow-sm">
                                    <span class="input-group-text bg-light border-end-0"><i class="bi bi-boxes text-secondary"></i></span>
                                    <input type="number" class="form-control border-start-0 ps-0" th:field="*{quantidadeEstoque}" placeholder="0" required>
                                </div>
                            </div>

                            <div class="d-grid gap-3">
                                <button type="submit" class="btn btn-success btn-lg fw-bold shadow-sm">
                                    <i class="bi bi-check2-circle me-1"></i> Salvar Dados
                                </button>
                                <a href="/menu" class="btn btn-outline-secondary fw-bold">
                                    <i class="bi bi-arrow-left me-1"></i> Cancelar e Voltar
                                </a>
                            </div>
                            
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-3 text-muted small mt-auto">
        &copy; 2026 Lumina Stock - Versão Web
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const inputsDinheiro = document.querySelectorAll('.mascara-dinheiro');

            // Função que aplica a máscara BRL
            function formatarMoeda(valor) {
                let v = valor.replace(/\D/g, ''); // Remove tudo o que não é dígito
                if (v === '') return '';
                v = (v / 100).toFixed(2) + ''; // Divide por 100 para ter as casas decimais
                v = v.replace('.', ','); // Troca ponto por vírgula
                v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, '$1.'); // Coloca os pontos de milhar
                return v;
            }

            inputsDinheiro.forEach(input => {
                // 1. Ao carregar a página (se for edição, o Spring manda ex: 1250.5)
                if (input.value && input.value !== "0.0") {
                    let floatVal = parseFloat(input.value);
                    if (!isNaN(floatVal)) {
                        let strVal = floatVal.toFixed(2).replace('.', '');
                        input.value = formatarMoeda(strVal);
                    }
                } else {
                    input.value = ''; // Limpa se for novo cadastro
                }

                // 2. Enquanto o usuário digita
                input.addEventListener('input', function(e) {
                    this.value = formatarMoeda(this.value);
                });
            });

            // 3. Antes de enviar para o Java (limpa a formatação)
            document.getElementById('formProduto').addEventListener('submit', function(e) {
                inputsDinheiro.forEach(input => {
                    if (input.value) {
                        let valorLimpo = input.value.replace(/\./g, '').replace(',', '.');
                        input.value = valorLimpo;
                    }
                });
            });
        });
    </script>
</body>
</html>
