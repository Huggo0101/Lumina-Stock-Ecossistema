<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Configurar 2FA - Lumina Stock</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        body { background-color: #f8f9fa; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .card { border: none; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card p-4 text-center">
                    <h4 class="fw-bold"><i class="bi bi-qr-code-scan text-warning"></i> Configurar Autenticador</h4>
                    <p class="text-muted small">Escaneie o QR Code abaixo usando o Google Authenticator ou Authy no seu celular:</p>
                    
                    <div class="bg-white border rounded p-3 d-inline-block my-3 shadow-sm">
                        <img th:src="${qrCode}" alt="QR Code Gerado" style="width: 200px; height: 200px;">
                    </div>
                    
                    <div th:if="${erro}" class="alert alert-danger small" th:text="${erro}"></div>

                    <form th:action="@{/ativar-2fa}" method="post">
                        <div class="mb-3">
                            <label class="form-label text-muted small fw-bold">DIGITE O CÓDIGO DO APP</label>
                            <input type="text" name="codigo" class="form-control text-center fw-bold fs-4" placeholder="000000" maxlength="6" autocomplete="off" required>
                        </div>
                        <button type="submit" class="btn btn-success w-100 fw-bold">Validar e Ativar Segurança</button>
                        
                        <a th:href="@{/menu}" class="btn btn-link text-decoration-none text-muted mt-3 d-block small">
                            <i class="bi bi-arrow-left"></i> Voltar ao Menu
                        </a>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        const inputCodigo = document.querySelector('input[name="codigo"]');
        inputCodigo.addEventListener('input', function (e) {
            this.value = this.value.replace(/[^0-9]/g, '');
        });
    </script>
</body>
</html>
