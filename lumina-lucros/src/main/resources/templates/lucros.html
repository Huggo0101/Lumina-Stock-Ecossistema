<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Módulo de Lucros - Lumina</title>
    <meta charset="UTF-8">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <style>
        .navbar-custom { background-color: #212529; }
        .text-lumina { color: #198754; } /* Verde para remeter ao financeiro/Excel */
        .table-header-dark { background-color: #212529 !important; color: white !important; }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

    <nav class="navbar navbar-expand-lg navbar-dark navbar-custom shadow-sm py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <span class="navbar-brand fw-bold text-lumina m-0 fs-4">
                <i class="bi bi-graph-up-arrow"></i> Lumina Financeiro
            </span>
            <span class="badge border border-info text-info bg-dark px-3 py-2 rounded-pill shadow-sm">
                <i class="bi bi-circle-fill text-success small"></i> Módulo Independente (Porta 8082)
            </span>
        </div>
    </nav>

    <div class="container py-5 flex-grow-1">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold text-dark"><i class="bi bi-cash-coin me-2"></i> Análise de Rentabilidade</h3>
            <a href="http://localhost:8080/menu" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Voltar ao Menu Principal
            </a>
        </div>

        <div th:if="${erroIntegracao}" class="alert alert-danger shadow-sm">
            <i class="bi bi-exclamation-triangle-fill"></i> <span th:text="${erroIntegracao}"></span>
        </div>

        <div class="card shadow-sm border-0 mb-4 rounded" th:unless="${erroIntegracao}">
            <div class="card-body text-center bg-white rounded border-bottom border-light pt-4 pb-4">
                <h6 class="text-muted text-uppercase fw-bold mb-2">Lucro Total Realizado na Loja</h6>
                <h1 class="text-lumina fw-bold display-4 m-0">
                    R$ <span th:text="${#numbers.formatDecimal(lucroTotalGeral, 1, 'POINT', 2, 'COMMA')}">0.00</span>
                </h1>
            </div>
        </div>

        <div class="card shadow-sm border-0 rounded" th:unless="${erroIntegracao}">
            <div class="card-header bg-white border-bottom border-light pt-3 pb-2">
                <h6 class="fw-bold text-dark m-0"><i class="bi bi-list-ul me-1"></i> Detalhamento por Produto e Margem</h6>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover table-striped mb-0 align-middle">
                        <thead>
                            <tr>
                                <th class="table-header-dark ps-4">Produto</th>
                                <th class="table-header-dark text-center">Qtd. Vendida</th>
                                <th class="table-header-dark text-center">Margem de Lucro (%)</th>
                                <th class="table-header-dark text-end pe-4">Lucro Gerado</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="p : ${produtos}">
                                <td class="fw-bold text-secondary ps-4" th:text="${p.nome}"></td>
                                <td class="text-center fw-semibold" th:text="${p.quantidadeVendida}"></td>
                                <td class="text-center">
                                    <span class="badge bg-success" th:text="${#numbers.formatDecimal(p.margemLucro, 1, 'POINT', 1, 'COMMA')} + '%'"></span>
                                </td>
                                <td class="text-end pe-4 text-lumina fw-bold" 
                                    th:text="'R$ ' + ${#numbers.formatDecimal(p.lucroTotalRealizado, 1, 'POINT', 2, 'COMMA')}">
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <footer class="text-center py-4 bg-dark text-white-50 mt-auto small">
        &copy; 2026 Lumina Inteligência Financeira
    </footer>

</body>
</html>
